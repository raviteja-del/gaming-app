<!DOCTYPE html>
<html>
<head>
<title>Game Details</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    overflow: hidden;
}

/* video background */
video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* overlay (dark effect) */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* layout */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 3D card */
.card {
    display: flex;
    gap: 30px;
    background: rgba(0,0,0,0.7);
    padding: 30px;
    border-radius: 20px;
    transform-style: preserve-3d;
    transition: transform 0.1s, box-shadow 0.3s;
}

/* glow on hover */
.card:hover {
    box-shadow: 0 0 30px cyan;
}

/* image */
.card img {
    width: 300px;
    border-radius: 15px;
}

/* text */
.info {
    max-width: 400px;
}

.info h1 {
    font-size: 35px;
}

/* rating */
.rating {
    color: gold;
    margin-top: 10px;
}

/* button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    background: cyan;
    border: none;
    cursor: pointer;
}

/* loading */
.loading {
    text-align: center;
    font-size: 22px;
}

/* modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.modal iframe {
    width: 80%;
    height: 60%;
}

.close {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    cursor: pointer;
}

/* back button */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
}

/* footer */
footer {
    position: absolute;
    bottom: 0;
    width: 100%;
    text-align: center;
    background: black;
    padding: 10px;
}
</style>

</head>

<body>

<video id="bgVideo" autoplay muted loop></video>
<div class="overlay"></div>

<button class="back" onclick="goBack()">⬅ Back</button>

<div class="wrapper">
    <div class="card loading" id="card">Loading game...</div>
</div>

<div class="modal" id="modal">
    <span class="close" onclick="closeModal()">✖</span>
    <iframe id="trailer" allowfullscreen></iframe>
</div>

<footer>
Help: ravi@gmail.com | Privacy Policy
</footer>

<script>
function goBack() {
    window.location.href = "index.html";
}

const id = new URLSearchParams(window.location.search).get("id");

// 🔥 IMPORTANT: Use EC2 IP (NOT localhost)
const API_URL = `http://44.204.137.194:5000/games/${id}`;

fetch(API_URL)
.then(res => res.json())
.then(game => {

    // fallback video
    const video = document.getElementById("bgVideo");
    video.src = game.video || "";

    const card = document.getElementById("card");

    card.classList.remove("loading");

    card.innerHTML = `
        <img src="${game.image}" alt="${game.name}">
        <div class="info">
            <h1>${game.name}</h1>
            <p>${game.description}</p>
            <div class="rating">⭐ ${game.rating}</div>
            <button onclick="openModal('${game.trailer}')">▶ Watch Trailer</button>
        </div>
    `;
})

.catch(err => {
    document.getElementById("card").innerHTML = "⚠ Failed to load game data";
    console.error(err);
});

/* 3D tilt effect */
document.addEventListener("mousemove", (e) => {
    const card = document.getElementById("card");

    let x = (window.innerWidth / 2 - e.pageX) / 25;
    let y = (window.innerHeight / 2 - e.pageY) / 25;

    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* modal */
function openModal(url) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("trailer").src = url;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    document.getElementById("trailer").src = "";
}
</script>

</body>
</html>
