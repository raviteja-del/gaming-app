<!DOCTYPE html>
<html>
<head>
<title>Gaming Zone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #020617;
    color: white;
}

/* header */
header {
    text-align: center;
    padding: 20px;
    font-size: 2rem;
}

/* grid */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 25px;
    padding: 20px;
}

/* card */
.card {
    background: #0f172a;
    border-radius: 15px;
    overflow: hidden;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.3s;
}

/* 3D hover effect */
.card:hover {
    transform: rotateY(10deg) scale(1.05);
}

/* image */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* game name */
.game-name {
    text-align: center;
    padding: 12px;
    font-size: 18px;
    transition: 0.3s;
}

/* 3D text effect */
.game-name:hover {
    transform: perspective(500px) rotateX(15deg) scale(1.1);
    color: cyan;
}

/* footer */
footer {
    text-align: center;
    padding: 15px;
    background: black;
    margin-top: 20px;
}
</style>

</head>

<body>

<header>🎮 Gaming Zone</header>

<div class="container" id="games"></div>

<footer>
Help: ravi@gmail.com | Privacy Policy
</footer>

<script>
fetch('http://localhost:5000/games')
.then(res => res.json())
.then(data => {
    const container = document.getElementById("games");

    data.forEach(game => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${game.image}">
            <div class="game-name">${game.name}</div>
        `;

        card.onclick = () => {
            window.location.href = "game.html?id=" + game.id;
        };

        container.appendChild(card);
    });
});
</script>

</body>
</html>
